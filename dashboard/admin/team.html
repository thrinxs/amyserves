<div class="dash-toast" id="dashToast"></div>

<script>
var team = [
  { name: 'Chiamaka (Amy)', role: 'Founder & Managing Partner', brand: 'AmyServes Group', initials: 'CA', color: '#1A3C5E', email: 'hello@amyserves.com' },
  { name: 'HR Lead', role: 'Head of HR Consulting', brand: 'Yourfirm Consults', initials: 'HR', color: '#3C3489', email: 'hr@amyserves.com' },
  { name: 'Operations Manager', role: 'Head of Cleaning Operations', brand: "Pura-Kle'N", initials: 'OM', color: '#0F6E56', email: 'ops@amyserves.com' },
  { name: 'Client Lead', role: 'Client Relations Manager', brand: 'AmyServes Group', initials: 'CL', color: '#C8941A', email: 'clients@amyserves.com' }
];

document.addEventListener('DOMContentLoaded', function(){
  var grid = document.getElementById('teamGrid');
  grid.innerHTML = team.map(function(m){
    return '<div class="dash-card" style="padding:28px;text-align:center">'
      + '<div style="width:64px;height:64px;border-radius:50%;background:'+m.color+';display:flex;align-items:center;justify-content:center;font-size:1.1rem;font-weight:700;color:#fff;margin:0 auto 16px">'+m.initials+'</div>'
      + '<div style="font-size:1rem;font-weight:700;color:var(--navy);margin-bottom:4px">'+m.name+'</div>'
      + '<div style="font-size:.82rem;color:var(--warm-grey);margin-bottom:10px">'+m.role+'</div>'
      + '<span class="dash-badge dash-badge--grey" style="margin-bottom:16px;display:inline-flex">'+m.brand+'</span>'
      + '<div style="font-size:.78rem;color:var(--teal)">'+m.email+'</div>'
      + '</div>';
  }).join('');

  document.getElementById('dashMenuToggle').addEventListener('click', function(){
    document.getElementById('dashSidebar').classList.toggle('open');
  });
});
</script>
