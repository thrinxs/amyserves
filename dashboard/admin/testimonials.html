  <style>
    .t-card {
      background: #fff;
      border-radius: 12px;
      padding: 20px 24px;
      margin-bottom: 16px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
      display: flex;
      gap: 20px;
      align-items: flex-start;
    }
    .t-card-body { flex: 1; }
    .t-card-name { font-weight: 700; color: var(--navy); margin-bottom: 2px; }
    .t-card-meta { font-size: 0.82rem; color: var(--warm-grey); margin-bottom: 8px; }
    .t-card-message { font-size: 0.92rem; color: #444; line-height: 1.6; margin-bottom: 12px; }
    .t-card-stars { color: #e0b040; font-size: 1rem; margin-bottom: 8px; }
    .t-card-actions { display: flex; gap: 8px; }
    .t-badge { display: inline-block; padding: 2px 10px; border-radius: 20px; font-size: 0.75rem; font-weight: 600; }
    .t-badge--pending { background: #fff3cd; color: #856404; }
    .t-badge--approved { background: #d1e7dd; color: #0a3622; }
    .t-empty { text-align: center; padding: 60px 20px; color: var(--warm-grey); }
    .t-tabs { display: flex; gap: 8px; margin-bottom: 24px; }
    .t-tab { padding: 8px 20px; border-radius: 20px; border: 1.5px solid var(--border); background: #fff; cursor: pointer; font-size: 0.9rem; color: var(--navy); }
    .t-tab.active { background: var(--navy); color: #fff; border-color: var(--navy); }
  </style>
</head>

      </div>
      <div class="dash-nav-section">
        <span class="dash-nav-label">Operations</span>

          Messages

        <a href="requests.html">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>

        <a href="content.html">

  <main class="dash-main">
    <div class="dash-topbar">
      <h1 class="dash-page-title">Testimonials</h1>
    </div>

    <div class="dash-content">
      <div class="t-tabs">
        <button class="t-tab active" id="tabPending" onclick="switchTab('pending')">Pending</button>
        <button class="t-tab" id="tabApproved" onclick="switchTab('approved')">Approved</button>
        <button class="t-tab" id="tabAll" onclick="switchTab('all')">All</button>
      </div>
      <div id="testimonialsContainer">
        <div class="t-empty">Loading testimonials…</div>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../../js/supabase.js"></script>
  <script src="../../js/auth.js"></script>
  <script>
    var allTestimonials = [];
    var currentTab = 'pending';

    async function loadTestimonials() {
      var res = await supabaseClient
        .from('testimonials')
        .select('*')
        .order('created_at', { ascending: false });

      if (res.error) { console.error(res.error); return; }
      allTestimonials = res.data || [];
      renderTab(currentTab);
    }

    function switchTab(tab) {
      currentTab = tab;
      document.querySelectorAll('.t-tab').forEach(function(t) { t.classList.remove('active'); });
      document.getElementById('tab' + tab.charAt(0).toUpperCase() + tab.slice(1)).classList.add('active');
      renderTab(tab);
    }

    function renderTab(tab) {
      var filtered = allTestimonials.filter(function(t) {
        if (tab === 'pending') return !t.approved;
        if (tab === 'approved') return t.approved;
        return true;
      });
      renderTestimonials(filtered);
    }

    function renderTestimonials(list) {
      var container = document.getElementById('testimonialsContainer');
      if (!list.length) {
        container.innerHTML = '<div class="t-empty">No testimonials found.</div>';
        return;
      }
      container.innerHTML = list.map(function(t) {
        var stars = '';
        for (var s = 1; s <= 5; s++) stars += s <= t.rating ? '★' : '☆';
        var subtitle = [t.role, t.company].filter(Boolean).join(' · ');
        var date = new Date(t.created_at).toLocaleDateString('en-NG', { day:'numeric', month:'short', year:'numeric' });
        return '<div class="t-card">' +
          '<div class="t-card-body">' +
          '<div class="t-card-name">' + t.name + ' <span class="t-badge ' + (t.approved ? 't-badge--approved' : 't-badge--pending') + '">' + (t.approved ? 'Approved' : 'Pending') + '</span></div>' +
          (subtitle ? '<div class="t-card-meta">' + subtitle + ' · ' + date + '</div>' : '<div class="t-card-meta">' + date + '</div>') +
          '<div class="t-card-stars">' + stars + '</div>' +
          '<div class="t-card-message">' + t.message + '</div>' +
          '<div class="t-card-actions">' +
          (!t.approved ? '<button class="dash-btn dash-btn--primary dash-btn--sm" onclick="approveTestimonial(\'' + t.id + '\')">Approve</button>' : '<button class="dash-btn dash-btn--secondary dash-btn--sm" onclick="unapproveTestimonial(\'' + t.id + '\')">Unapprove</button>') +
          '<button class="dash-btn dash-btn--danger dash-btn--sm" onclick="deleteTestimonial(\'' + t.id + '\')">Delete</button>' +
          '</div></div></div>';
      }).join('');
    }

    async function approveTestimonial(id) {
      await supabaseClient.from('testimonials').update({ approved: true }).eq('id', id);
      await loadTestimonials();
    }

    async function unapproveTestimonial(id) {
      await supabaseClient.from('testimonials').update({ approved: false }).eq('id', id);
      await loadTestimonials();
    }

    async function deleteTestimonial(id) {
      if (!confirm('Delete this testimonial?')) return;
      await supabaseClient.from('testimonials').delete().eq('id', id);
      await loadTestimonials();
    }

    document.addEventListener('DOMContentLoaded', function() {
      requireAuth(['admin']).then(function(session) {
        if (session) loadTestimonials();
      });
    });
  </script>
</body>
</html>
